# Lantern — local development docker-compose
#
# Starts: Redis, PostgreSQL, MinIO (S3-compatible), and all four Lantern services.
#
# Usage:
#   docker compose up          # start all services in foreground
#   docker compose up -d       # start in detached mode
#   docker compose down        # stop and remove containers
#   docker compose logs -f     # follow logs
#
# After starting, the UI is at http://localhost:8002.
# The Ingest API accepts spans at http://localhost:8000.
#
# Environment variables from .env (see .env.example):
#   MINIO_ROOT_USER, MINIO_ROOT_PASSWORD — MinIO credentials
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB — PostgreSQL credentials

services:
  redis:
    image: redis:7-alpine
    container_name: lantern-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: lantern-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lantern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lantern}
      POSTGRES_DB: ${POSTGRES_DB:-lantern}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lantern}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lantern-minio
    env_file: .env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_s3_access_key}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Create the lantern bucket on MinIO so the Writer and Query services
  # don't fail on first-start bucket creation races.
  minio-init:
    image: minio/mc:latest
    container_name: lantern-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio_s3_access_key} ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key};
      mc mb --ignore-existing local/lantern;
      exit 0;
      "

  # --- Lantern application services ---

  lantern-ingest:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: lantern-ingest
    command: lantern-ingest
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      LANTERN_DATABASE_DRIVER: postgres
      LANTERN_DATABASE_DSN: postgres://${POSTGRES_USER:-lantern}:${POSTGRES_PASSWORD:-lantern}@postgres:5432/${POSTGRES_DB:-lantern}?sslmode=disable
      LANTERN_REDIS_ADDR: redis:6379
      LANTERN_STORAGE_ENDPOINT: http://minio:9000
      LANTERN_STORAGE_BUCKET: lantern
      LANTERN_STORAGE_REGION: us-east-1
      LANTERN_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_s3_access_key}
      LANTERN_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key}
      LANTERN_AUTH_SECURE_COOKIE: "false"

  lantern-writer:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: lantern-writer
    command: lantern-writer
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8001:8001"
      - "9091:9090"
    environment:
      LANTERN_DATABASE_DRIVER: postgres
      LANTERN_DATABASE_DSN: postgres://${POSTGRES_USER:-lantern}:${POSTGRES_PASSWORD:-lantern}@postgres:5432/${POSTGRES_DB:-lantern}?sslmode=disable
      LANTERN_REDIS_ADDR: redis:6379
      LANTERN_STORAGE_ENDPOINT: http://minio:9000
      LANTERN_STORAGE_BUCKET: lantern
      LANTERN_STORAGE_REGION: us-east-1
      LANTERN_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_s3_access_key}
      LANTERN_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key}
      LANTERN_WRITER_DUCKDB_PATH: /data/lantern.duckdb
      LANTERN_WRITER_SYNC_INTERVAL: 30s
      LANTERN_WRITER_FLUSH_INTERVAL: 30m
      LANTERN_WRITER_FLUSH_AGE_DAYS: 2
    volumes:
      - writer-data:/data

  lantern-query:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: lantern-query
    command: lantern-query
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8002:8002"
      - "9092:9090"
    environment:
      LANTERN_DATABASE_DRIVER: postgres
      LANTERN_DATABASE_DSN: postgres://${POSTGRES_USER:-lantern}:${POSTGRES_PASSWORD:-lantern}@postgres:5432/${POSTGRES_DB:-lantern}?sslmode=disable
      LANTERN_STORAGE_ENDPOINT: http://minio:9000
      LANTERN_STORAGE_BUCKET: lantern
      LANTERN_STORAGE_REGION: us-east-1
      LANTERN_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_s3_access_key}
      LANTERN_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key}
      LANTERN_AUTH_SECURE_COOKIE: "false"
      LANTERN_AUTH_ADMIN_EMAIL: admin@lantern.dev
      LANTERN_AUTH_ADMIN_PASSWORD: admin
      LANTERN_QUERY_DUCKDB_PATH: /tmp/lantern-snapshot.duckdb
      LANTERN_QUERY_SYNC_INTERVAL: 30s

  lantern-eval:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: lantern-eval
    command: lantern-eval
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8003:8003"
      - "9093:9090"
    environment:
      LANTERN_DATABASE_DRIVER: postgres
      LANTERN_DATABASE_DSN: postgres://${POSTGRES_USER:-lantern}:${POSTGRES_PASSWORD:-lantern}@postgres:5432/${POSTGRES_DB:-lantern}?sslmode=disable
      LANTERN_REDIS_ADDR: redis:6379
      LANTERN_STORAGE_ENDPOINT: http://minio:9000
      LANTERN_STORAGE_BUCKET: lantern
      LANTERN_STORAGE_REGION: us-east-1
      LANTERN_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_s3_access_key}
      LANTERN_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key}
      LANTERN_EVAL_CONCURRENCY: 4
      LANTERN_EVAL_LLM_BASE_URL: ""
      LANTERN_EVAL_LLM_API_KEY: ""

volumes:
  redis-data:
  postgres-data:
  minio-data:
  writer-data:
