# Omneval — local development docker-compose
#
# Starts: Redis, PostgreSQL, MinIO (S3-compatible), and all four Omneval services.
#
# Usage:
#   docker compose up          # start all services in foreground
#   docker compose up -d       # start in detached mode
#   docker compose down        # stop and remove containers
#   docker compose logs -f     # follow logs
#
# After starting, the UI is at http://localhost:8002.
# The Ingest API accepts spans at http://localhost:8000.
#
# Environment variables from .env (see .env.example):
#   MINIO_ROOT_USER, MINIO_ROOT_PASSWORD — MinIO credentials
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB — PostgreSQL credentials

services:
  redis:
    image: redis:7-alpine
    container_name: omneval-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: omneval-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omneval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omneval}
      POSTGRES_DB: ${POSTGRES_DB:-omneval}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omneval}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: omneval-minio
    env_file: .env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_s3_access_key}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Create the omneval bucket on MinIO so the Writer and Query services
  # don't fail on first-start bucket creation races.
  minio-init:
    image: minio/mc:latest
    container_name: omneval-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio_s3_access_key} ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key};
      mc mb --ignore-existing local/omneval;
      exit 0;
      "

  # --- Omneval application services ---

  omneval-ingest:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: omneval-ingest
    command: omneval-ingest
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      OMNEVAL_DATABASE_DRIVER: postgres
      OMNEVAL_DATABASE_DSN: postgres://${POSTGRES_USER:-omneval}:${POSTGRES_PASSWORD:-omneval}@postgres:5432/${POSTGRES_DB:-omneval}?sslmode=disable
      OMNEVAL_REDIS_ADDR: redis:6379
      OMNEVAL_STORAGE_ENDPOINT: http://minio:9000
      OMNEVAL_STORAGE_BUCKET: omneval
      OMNEVAL_STORAGE_REGION: us-east-1
      OMNEVAL_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_s3_access_key}
      OMNEVAL_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key}
      OMNEVAL_AUTH_SECURE_COOKIE: "false"

  omneval-writer:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: omneval-writer
    command: omneval-writer
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8001:8001"
      - "9091:9090"
    environment:
      OMNEVAL_DATABASE_DRIVER: postgres
      OMNEVAL_DATABASE_DSN: postgres://${POSTGRES_USER:-omneval}:${POSTGRES_PASSWORD:-omneval}@postgres:5432/${POSTGRES_DB:-omneval}?sslmode=disable
      OMNEVAL_REDIS_ADDR: redis:6379
      OMNEVAL_STORAGE_ENDPOINT: http://minio:9000
      OMNEVAL_STORAGE_BUCKET: omneval
      OMNEVAL_STORAGE_REGION: us-east-1
      OMNEVAL_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_s3_access_key}
      OMNEVAL_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key}
      OMNEVAL_WRITER_DUCKDB_PATH: /data/omneval.duckdb
      OMNEVAL_WRITER_SYNC_INTERVAL: 30s
      OMNEVAL_WRITER_FLUSH_INTERVAL: 30m
      OMNEVAL_WRITER_FLUSH_AGE_DAYS: 2
    volumes:
      - writer-data:/data

  omneval-query:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: omneval-query
    command: omneval-query
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8002:8002"
      - "9092:9090"
    environment:
      OMNEVAL_DATABASE_DRIVER: postgres
      OMNEVAL_DATABASE_DSN: postgres://${POSTGRES_USER:-omneval}:${POSTGRES_PASSWORD:-omneval}@postgres:5432/${POSTGRES_DB:-omneval}?sslmode=disable
      OMNEVAL_STORAGE_ENDPOINT: http://minio:9000
      OMNEVAL_STORAGE_BUCKET: omneval
      OMNEVAL_STORAGE_REGION: us-east-1
      OMNEVAL_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_s3_access_key}
      OMNEVAL_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key}
      OMNEVAL_AUTH_SECURE_COOKIE: "false"
      OMNEVAL_AUTH_ADMIN_EMAIL: admin@omneval.com
      OMNEVAL_AUTH_ADMIN_PASSWORD: admin
      OMNEVAL_QUERY_DUCKDB_PATH: /tmp/omneval-snapshot.duckdb
      OMNEVAL_QUERY_SYNC_INTERVAL: 30s

  omneval-eval:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: omneval-eval
    command: omneval-eval
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8003:8003"
      - "9093:9090"
    environment:
      OMNEVAL_DATABASE_DRIVER: postgres
      OMNEVAL_DATABASE_DSN: postgres://${POSTGRES_USER:-omneval}:${POSTGRES_PASSWORD:-omneval}@postgres:5432/${POSTGRES_DB:-omneval}?sslmode=disable
      OMNEVAL_REDIS_ADDR: redis:6379
      OMNEVAL_STORAGE_ENDPOINT: http://minio:9000
      OMNEVAL_STORAGE_BUCKET: omneval
      OMNEVAL_STORAGE_REGION: us-east-1
      OMNEVAL_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_s3_access_key}
      OMNEVAL_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_s3_secret_key}
      OMNEVAL_EVAL_CONCURRENCY: 4
      OMNEVAL_EVAL_LLM_BASE_URL: ""
      OMNEVAL_EVAL_LLM_API_KEY: ""

volumes:
  redis-data:
  postgres-data:
  minio-data:
  writer-data:
