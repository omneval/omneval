# Staging overlay for Omneval
#
# Applies staging-grade replica counts and resource limits on top of
# the Omneval kustomize base. Designed for pre-production testing.
#
# Usage:
#   kustomize build deploy/kustomize/overlays/staging
#
# Flux CD example:
#   apiVersion: kustomize.toolkit.fluxcd.io/v1
#   kind: Kustomization
#   metadata:
#     name: omneval-staging
#     namespace: flux-system
#   spec:
#     interval: 10m
#     path: ./deploy/kustomize/overlays/staging
#     prune: true
#     sourceRef:
#       kind: GitRepository
#       name: flux-system
#
# ArgoCD example:
#   apiVersion: argoproj.io/v1alpha1
#   kind: Application
#   metadata:
#     name: omneval-staging
#     namespace: argocd
#   spec:
#     source:
#       path: deploy/kustomize/overlays/staging
#       repoURL: https://github.com/<org>/omneval.git
#       targetRevision: main

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: omneval

# Staging replica counts
replicas:
  - name: ingest
    count: 2
  - name: query
    count: 2
  - name: eval
    count: 2
  - name: writer
    count: 1

# Staging resource limits
patches:
  # Ingest: moderate resources, horizontal scale
  - target:
      kind: Deployment
      name: ingest
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

  # Writer: higher resources (DuckDB operations), single replica
  - target:
      kind: StatefulSet
      name: writer
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi

  # Query: moderate resources, horizontal scale
  - target:
      kind: Deployment
      name: query
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

  # Eval: moderate resources for LLM judge calls
  - target:
      kind: Deployment
      name: eval
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
