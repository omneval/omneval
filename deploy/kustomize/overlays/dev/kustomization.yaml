# Development overlay for Omneval
#
# Applies reduced resource requests and single replica per service.
# Designed for local development, minikube, kind, or small dev clusters.
#
# Usage:
#   kustomize build deploy/kustomize/overlays/dev
#
# Flux CD example:
#   apiVersion: kustomize.toolkit.fluxcd.io/v1
#   kind: Kustomization
#   metadata:
#     name: omneval-dev
#     namespace: flux-system
#   spec:
#     interval: 5m
#     path: ./deploy/kustomize/overlays/dev
#     prune: true
#     sourceRef:
#       kind: GitRepository
#       name: flux-system

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: omneval

# Development replica counts — single replica per service
replicas:
  - name: ingest
    count: 1
  - name: query
    count: 1
  - name: eval
    count: 1
  - name: writer
    count: 1

patches:
  # Disable Redis (use local SQLite, no Redis needed for minimal dev)
  - target:
      kind: Deployment
      name: omneval-redis
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0

  # Disable PostgreSQL (use SQLite in dev)
  - target:
      kind: StatefulSet
      name: omneval-postgresql
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0

  # Disable MinIO (not needed for minimal dev)
  - target:
      kind: Deployment
      name: omneval-minio
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0

  # Reduce Ingest resource limits for dev clusters
  - target:
      kind: Deployment
      name: ingest
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  # Reduce Writer resource limits for dev clusters
  - target:
      kind: Deployment
      name: writer
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

  # Reduce Query resource limits for dev clusters
  - target:
      kind: Deployment
      name: query
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  # Reduce Eval resource limits for dev clusters
  - target:
      kind: Deployment
      name: eval
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  # Override ConfigMap for dev (SQLite, no S3)
  - target:
      kind: ConfigMap
      name: omneval-config
    patch: |
      - op: replace
        path: /data/omneval.yaml
        value: |
          database:
            driver: sqlite
          redis:
            addr: omneval-redis:6379
          storage: {}
          auth:
            session_ttl: 168h
            secure_cookie: true
          ingest:
            addr: ":8000"
            log_system_prompt: true
            cors_allowed_origins:
              - "*"
          writer:
            addr: ":8001"
            duckdb_path: "/data/omneval.duckdb"
            sync_interval: 30s
            flush_interval: 30m
            flush_age_days: 2
            leader_election:
              enabled: false
              lock_ttl: 15
          query:
            addr: ":8002"
            duckdb_path: "/tmp/omneval-snapshot.duckdb"
            sync_interval: 30s
          eval:
            concurrency: 4
            judge_timeout: 90s
            retry_count: 3
          metrics:
            addr: ":9090"
            disable_project_labels: false
