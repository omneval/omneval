# Development overlay for Lantern
#
# Applies reduced resource requests, single replica, and emptyDir
# storage (instead of PVC) for the Writer Service. Designed for
# local development, minikube, kind, or small dev clusters.
#
# Usage:
#   kustomize build deploy/kustomize/overlays/dev
#
# Flux CD example:
#   apiVersion: kustomize.toolkit.fluxcd.io/v1
#   kind: Kustomization
#   metadata:
#     name: lantern-dev
#     namespace: flux-system
#   spec:
#     interval: 5m
#     path: ./deploy/kustomize/overlays/dev
#     prune: true
#     sourceRef:
#       kind: GitRepository
#       name: flux-system

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: lantern

# Development replica counts — single replica per service
replicas:
  - name: ingest
    count: 1
  - name: query
    count: 1
  - name: eval
    count: 1
  - name: writer
    count: 1

patches:
  # Disable Redis (use local SQLite, no Redis needed for minimal dev)
  - target:
      kind: Deployment
      name: lantern-redis
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0

  # Disable PostgreSQL (use SQLite in dev)
  - target:
      kind: StatefulSet
      name: lantern-postgresql
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0

  # Disable MinIO (not needed for minimal dev)
  - target:
      kind: Deployment
      name: lantern-minio
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0

  # Reduce Ingest resource limits for dev clusters
  - target:
      kind: Deployment
      name: ingest
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  # Reduce Writer resource limits for dev clusters
  - target:
      kind: StatefulSet
      name: writer
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

  # Reduce Query resource limits for dev clusters
  - target:
      kind: Deployment
      name: query
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  # Reduce Eval resource limits for dev clusters
  - target:
      kind: Deployment
      name: eval
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  # Replace the Writer PVC with emptyDir (no persistent storage in dev)
  - target:
      kind: StatefulSet
      name: writer
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates
        value:
          - metadata:
              name: data
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: ""
              resources:
                requests:
                  storage: 1Gi

  # Override ConfigMap for dev (SQLite, no S3)
  - target:
      kind: ConfigMap
      name: lantern-config
    patch: |
      - op: replace
        path: /data/lantern.yaml
        value: |
          database:
            driver: sqlite
          redis:
            addr: lantern-redis:6379
          storage: {}
          auth:
            session_ttl: 168h
            secure_cookie: true
          ingest:
            addr: ":8000"
            log_system_prompt: true
            cors_allowed_origins:
              - "*"
          writer:
            addr: ":8001"
            duckdb_path: "/data/lantern.duckdb"
            sync_interval: 30s
            flush_interval: 30m
            flush_age_days: 2
            leader_election:
              enabled: false
              lock_ttl: 15
          query:
            addr: ":8002"
            duckdb_path: "/tmp/lantern-snapshot.duckdb"
            sync_interval: 30s
          eval:
            concurrency: 4
            judge_timeout: 90s
            retry_count: 3
          metrics:
            addr: ":9090"
            disable_project_labels: false
