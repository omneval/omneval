# Redis Deployment — message broker for inter-service queues.
#
# Deployed as a single-instance Deployment. Persistent storage is optional.
#
# When using external Redis, disable this resource in your overlay and
# configure the Redis address via the lantern-config ConfigMap instead.
#
# Usage:
#   kustomize build deploy/kustomize/base  # includes Redis
#
# To disable Redis (use external):
#   # overlays/staging/kustomization.yaml
#   patches:
#     - target:
#         kind: Deployment
#         name: lantern-redis
#       patch: |-
#         apiVersion: apps/v1
#         kind: Deployment
#         metadata:
#           name: lantern-redis
#         spec:
#           replicas: 0

apiVersion: v1
kind: Service
metadata:
  name: lantern-redis
  labels:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: lantern
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/component: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lantern-redis
  labels:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: lantern
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lantern
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lantern
        app.kubernetes.io/component: redis
        app.kubernetes.io/part-of: lantern
    spec:
      containers:
        - name: redis
          image: docker.io/library/redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: lantern-redis-data
---
# PVC for Redis data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lantern-redis-data
  labels:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/component: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
