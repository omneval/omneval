apiVersion: v1
kind: Secret
metadata:
  name: lantern-secret
  labels:
    app.kubernetes.io/name: lantern
type: Opaque
stringData:
  # S3 credentials — set when using S3-compatible object storage
  storage-access-key: ""
  storage-secret-key: ""
  # Judge LLM API key (OpenAI-compatible)
  eval-llm-api-key: ""
  # Redis password (only needed if Redis auth is enabled)
  redis-password: ""
  # Admin bootstrap credentials (only needed for first-time setup)
  admin-password: ""
  admin-email: ""
  # PostgreSQL DSN (only needed when using Postgres metadata store)
  postgres-dsn: ""
  # PostgreSQL password (only needed when using Postgres metadata store)
  postgres-password: ""
