# PostgreSQL StatefulSet — metadata store for Omneval.
#
# Deployed as a single-replica StatefulSet with persistent storage.
#
# When using external PostgreSQL, disable this resource in your overlay and
# configure the database DSN via the omneval-secret Secret instead.
#
# Usage:
#   kustomize build deploy/kustomize/base  # includes PostgreSQL
#
# To disable PostgreSQL (use external):
#   # overlays/staging/kustomization.yaml
#   patches:
#     - target:
#         kind: StatefulSet
#         name: omneval-postgresql
#       patch: |-
#         apiVersion: apps/v1
#         kind: StatefulSet
#         metadata:
#           name: omneval-postgresql
#         spec:
#           replicas: 0

apiVersion: v1
kind: Service
metadata:
  name: omneval-postgresql
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: postgresql
    app.kubernetes.io/part-of: omneval
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: omneval-postgresql
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: postgresql
    app.kubernetes.io/part-of: omneval
spec:
  serviceName: omneval-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omneval
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omneval
        app.kubernetes.io/component: postgresql
        app.kubernetes.io/part-of: omneval
    spec:
      containers:
        - name: postgresql
          image: docker.io/library/postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "omneval"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: postgres-password
            - name: POSTGRES_DB
              value: "omneval"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          command:
            - postgres
            - -c
            - config_file=/etc/postgresql/postgresql.conf
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: postgresql-config
              mountPath: /etc/postgresql
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - omneval
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - omneval
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: postgresql-config
          configMap:
            name: omneval-postgresql-config
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
# PostgreSQL configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: omneval-postgresql-config
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: postgresql
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 100
    shared_buffers = 128MB
    dynamic_shared_memory_type = posix
    log_min_duration_statement = 1000
    tcp_keepalives_idle = 60
    tcp_keepalives_interval = 10
    tcp_keepalives_count = 6
