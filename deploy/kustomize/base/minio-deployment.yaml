# MinIO Deployment — S3-compatible object store for cold storage.
#
# Deployed as a single-instance Deployment with a PVC for persistent storage.
# Also creates a startup job to initialize the bucket.
#
# When using external S3-compatible storage, disable this resource in your
# overlay and configure the storage endpoint/credentials via the ConfigMap
# and Secret instead.
#
# Usage:
#   kustomize build deploy/kustomize/base  # includes MinIO
#
# To disable MinIO (use external S3):
#   # overlays/staging/kustomization.yaml
#   patches:
#     - target:
#         kind: Deployment
#         name: omneval-minio
#       patch: |-
#         apiVersion: apps/v1
#         kind: Deployment
#         metadata:
#           name: omneval-minio
#         spec:
#           replicas: 0

apiVersion: v1
kind: Service
metadata:
  name: omneval-minio
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: minio
    app.kubernetes.io/part-of: omneval
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
  selector:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omneval-minio
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: minio
    app.kubernetes.io/part-of: omneval
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omneval
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omneval
        app.kubernetes.io/component: minio
        app.kubernetes.io/part-of: omneval
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent
          command:
            - minio
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: minio-root-password
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: "public"
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          volumeMounts:
            - name: minio-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: omneval-minio-data
---
# PVC for MinIO data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omneval-minio-data
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# Job to create the omneval bucket on MinIO startup
apiVersion: batch/v1
kind: Job
metadata:
  name: omneval-minio-init
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: minio
    app.kubernetes.io/part-of: omneval
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              until nc -z omneval-minio 9000; do
                echo "Waiting for MinIO...";
                sleep 2;
              done
      containers:
        - name: minio-mc
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for MinIO to be ready..."
              until mc alias set local http://omneval-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "  Retrying..."
                sleep 2
              done
              echo "Creating bucket 'omneval'..."
              mc mb --ignore-existing local/omneval
              echo "Bucket initialization complete."
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: minio-root-password
