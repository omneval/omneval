# RBAC resources for the VolumeSnapshot CronJob.
#
# The CronJob needs permissions to:
#   - Get/List/Watch PVCs (to discover the source volume)
#   - Create/Get/List/Watch VolumeSnapshot resources
#   - Create/Get/List/Watch VolumeSnapshotContent resources
#
# Use a namespaced Role + RoleBinding instead of ClusterRole if your
# cluster has namespace-scoped RBAC policies (e.g., OPA Gatekeeper).

apiVersion: v1
kind: ServiceAccount
metadata:
  name: omneval-volume-snapshot
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: writer
    app.kubernetes.io/part-of: omneval
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: omneval-volume-snapshot
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: writer
    app.kubernetes.io/part-of: omneval
rules:
  # Allow discovery of PVCs (to find source PV for snapshot)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # Allow creating and managing VolumeSnapshot resources
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: omneval-volume-snapshot
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: writer
    app.kubernetes.io/part-of: omneval
subjects:
  - kind: ServiceAccount
    name: omneval-volume-snapshot
    namespace: omneval
roleRef:
  kind: ClusterRole
  name: omneval-volume-snapshot
  apiGroup: rbac.authorization.k8s.io
