apiVersion: apps/v1
kind: Deployment
metadata:
  name: eval
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: eval
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: omneval
      app.kubernetes.io/component: eval
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omneval
        app.kubernetes.io/component: eval
    spec:
      containers:
        - name: eval
          image: omneval/app:latest
          imagePullPolicy: IfNotPresent
          command: ["omneval-eval"]
          env:
            - name: OMNEVAL_CONFIG
              value: "/etc/omneval/omneval.yaml"
            - name: OMNEVAL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: redis-password
                  optional: true
            - name: OMNEVAL_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: storage-access-key
                  optional: true
            - name: OMNEVAL_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: storage-secret-key
                  optional: true
            - name: OMNEVAL_EVAL_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: eval-llm-api-key
                  optional: true
            - name: OMNEVAL_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: postgres-dsn
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/omneval
              readOnly: true
          livenessProbe:
            exec:
              command:
                - cat
                - /proc/1/status
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: omneval-config
