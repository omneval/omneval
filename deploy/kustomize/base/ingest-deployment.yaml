apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: ingest
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: omneval
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omneval
        app.kubernetes.io/component: ingest
    spec:
      containers:
        - name: ingest
          image: omneval/app:latest
          imagePullPolicy: IfNotPresent
          command: ["omneval-ingest"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: OMNEVAL_CONFIG
              value: "/etc/omneval/omneval.yaml"
            - name: OMNEVAL_AUTH_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: admin-email
                  optional: true
            - name: OMNEVAL_AUTH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: admin-password
                  optional: true
            - name: OMNEVAL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: redis-password
                  optional: true
            - name: OMNEVAL_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: storage-access-key
                  optional: true
            - name: OMNEVAL_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: storage-secret-key
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/omneval
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: omneval-config
