apiVersion: v1
kind: ConfigMap
metadata:
  name: omneval-config
  labels:
    app.kubernetes.io/name: omneval
data:
  omneval.yaml: |
    database:
      driver: postgres
      dsn: postgres://omneval:omneval@omneval-postgresql:5432/omneval?sslmode=disable
    redis:
      addr: omneval-redis:6379
    storage:
      endpoint: http://omneval-minio:9000
      bucket: omneval
      region: us-east-1
    auth:
      session_ttl: 168h
      secure_cookie: false
    ingest:
      addr: ":8000"
      log_system_prompt: true
      cors_allowed_origins:
        - "*"
    writer:
      addr: ":8001"
      duckdb_path: "/data/omneval.duckdb"
      sync_interval: 30s
      flush_interval: 30m
      flush_age_days: 2
      leader_election:
        enabled: false
        lock_ttl: 15
    query:
      addr: ":8002"
      duckdb_path: "/tmp/omneval-snapshot.duckdb"
      sync_interval: 30s
    eval:
      concurrency: 4
      judge_timeout: 90s
      retry_count: 3
    metrics:
      addr: ":9090"
      disable_project_labels: false
