apiVersion: apps/v1
kind: Deployment
metadata:
  name: writer
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/component: writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omneval
      app.kubernetes.io/component: writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omneval
        app.kubernetes.io/component: writer
    spec:
      containers:
        - name: writer
          image: omneval/app:latest
          imagePullPolicy: IfNotPresent
          command: ["omneval-writer"]
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: OMNEVAL_CONFIG
              value: "/etc/omneval/omneval.yaml"
            - name: OMNEVAL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: redis-password
                  optional: true
            - name: OMNEVAL_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: storage-access-key
                  optional: true
            - name: OMNEVAL_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: storage-secret-key
                  optional: true
            - name: OMNEVAL_QUACK_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: omneval-secret
                  key: quack-token
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/omneval
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: omneval-config
