# Omneval Helm Chart — Production Values
#
# This chart deploys the Omneval tracing platform to Kubernetes.
# It includes all four Omneval services (ingest, writer, query, eval)
# along with Redis, PostgreSQL, and MinIO as backing infrastructure.
#
# Usage:
#   helm install omneval ./deploy/helm --values my-values.yaml
#   helm template omneval ./deploy/helm --values my-values.yaml
#   helm upgrade omneval ./deploy/helm --values my-values.yaml
#
# For a minimal demo with SQLite and no S3, set:
#   database.driver: sqlite
#   storage.bucket: ""
#   storage.endpoint: ""
#
# External infrastructure:
#   redis and postgresql support an "external" mode: set <component>.enabled:
#   false and <component>.external.<key>: <value> to use your own
#   infrastructure. For S3-compatible storage, set minio.enabled: false and
#   configure storage.* instead (see storage.existingSecret for sourcing
#   credentials from a pre-existing Secret). This allows mixing and matching —
#   you can run Redis internally while pointing to an external PostgreSQL.
#
# Example: use external Redis + internal PostgreSQL + external S3
#   redis:
#     enabled: false
#     external:
#       addr: "redis.mycompany.com:6379"
#       password: "s3cr3t"
#   postgresql:
#     enabled: true   # internal, using sub-chart settings below
#   storage:
#     endpoint: "https://s3.amazonaws.com"
#     bucket: "my-omneval-bucket"

# ============================================================================
# Image
# ============================================================================
image:
  # Repository of the Omneval image (built via the multi-stage Dockerfile)
  repository: omneval/app
  # Tag — defaults to chart appVersion
  tag: ""
  # Image pull policy
  pullPolicy: IfNotPresent

# ============================================================================
# Common labels applied to all resources
# ============================================================================
commonLabels: {}

# ============================================================================
# Ingest API (port 8000)
# ============================================================================
ingest:
  replicas: 2
  # Listen address (override via OMNEVAL_INGEST_ADDR)
  addr: ":8000"
  # Log system prompt in span input (override via OMNEVAL_INGEST_LOG_SYSTEM_PROMPT)
  logSystemPrompt: true
  # CORS allowed origins, comma-separated (override via OMNEVAL_INGEST_CORS_ALLOWED_ORIGINS)
  corsAllowedOrigins:
    - "*"
  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # Node selector, affinity, tolerations
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # Annotations for service discovery
  annotations: {}
  # Pod labels
  labels: {}
  # Horizontal Pod Autoscaler
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    # targetMemoryUtilizationPercentage: 80
  # Service account
  serviceAccount:
    create: false
    name: ""

# ============================================================================
# Writer Service (port 8001)
# ============================================================================
writer:
  replicas: 1
  # Listen address for the score handler endpoint
  addr: ":8001"
  # Resource limits and requests
  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  # Node selector, affinity, tolerations
  nodeSelector: {}
  affinity: {}
  tolerations: []
  annotations: {}
  labels: {}
  # Horizontal Pod Autoscaler
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    # targetMemoryUtilizationPercentage: 80
  # Service account
  serviceAccount:
    create: false
    name: ""

# ============================================================================
# Query API (port 8002)
# ============================================================================
query:
  replicas: 2
  # Listen address (override via OMNEVAL_QUERY_ADDR)
  addr: ":8002"
  # Session cookie TTL (override via OMNEVAL_AUTH_SESSION_TTL)
  sessionTTL: "168h"
  # Secure cookie flag (override via OMNEVAL_AUTH_SECURE_COOKIE)
  secureCookie: false
  # Bootstrap admin user on first startup (override via OMNEVAL_AUTH_ADMIN_EMAIL / OMNEVAL_AUTH_ADMIN_PASSWORD)
  # Set both adminEmail and adminPassword to auto-create the first admin user.
  adminEmail: ""
  adminPassword: ""
  # Source the bootstrap admin credentials from an existing Secret instead of
  # the plaintext adminEmail/adminPassword values above. Useful when the Secret
  # is managed externally (e.g. synced from a vault). When set, this takes
  # precedence over adminEmail/adminPassword. emailKey/passwordKey select which
  # keys in the Secret hold the admin email and password.
  existingSecret: ""
  emailKey: "admin-email"
  passwordKey: "admin-password"
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  affinity: {}
  tolerations: []
  annotations: {}
  labels: {}
  # Horizontal Pod Autoscaler
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    # targetMemoryUtilizationPercentage: 80
  # Service account
  serviceAccount:
    create: false
    name: ""

# ============================================================================
# Eval Workers (queue consumer)
# ============================================================================
eval:
  replicas: 2
  # Number of concurrent judge LLM calls
  concurrency: 4
  # Judge LLM base URL (OpenAI-compatible, override via OMNEVAL_EVAL_LLM_BASE_URL)
  llmBaseURL: ""
  # Judge LLM model name (override via OMNEVAL_EVAL_LLM_MODEL)
  llmModel: "gpt-4"
  # Judge LLM API key (override via OMNEVAL_EVAL_LLM_API_KEY)
  llmAPIKey: ""
  # Judge call timeout (override via OMNEVAL_EVAL_JUDGE_TIMEOUT)
  judgeTimeout: "90s"
  # Number of retries for failed judge calls
  retryCount: 3
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  affinity: {}
  tolerations: []
  annotations: {}
  labels: {}
  # Horizontal Pod Autoscaler
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    # targetMemoryUtilizationPercentage: 80
  # Service account
  serviceAccount:
    create: false
    name: ""

# ============================================================================
# Quack Server (port 9494) — sole Lake gateway (ADR-0005)
#
# Single-replica StatefulSet: the only process holding a direct DuckLake
# Catalog/data-path connection. Writer, Query API, and Eval attach as thin
# Quack clients via quack.client.url.
# ============================================================================
quack:
  server:
    replicas: 1
    # Quack protocol listen address (override via OMNEVAL_QUACK_SERVER_LISTEN_ADDR)
    listenAddr: ":9494"
    # Auth token for Quack clients.
    #
    # Three ways to provide the token, in precedence order:
    #
    # 1. existingSecret — pin a value in a pre-existing Secret and have all pods
    #    source the token from it. This is the recommended approach for GitOps
    #    workflows (Flux, ArgoCD) because the token lives in a separate Secret
    #    resource that can be managed by a vault sync, SOPS, or similar. When
    #    this is set, the chart does NOT write quack-token into omneval-secret.
    #
    #    Example:
    #      quack:
    #        server:
    #          existingSecret: my-quack-token-secret
    #          existingSecretKey: token
    #
    # 2. token — pin a plaintext token in values or valuesFrom. The chart writes
    #    it to omneval-secret on install and reuses it on upgrade.
    #
    # 3. (unset) — if neither token nor existingSecret is set, the chart
    #    generates a random token stored in omneval-secret on first install and
    #    reuses it on subsequent upgrades. The random value is derived from the
    #    release name so that it survives upgrades (see omneval.quackToken).
    #
    # WARNING: omits quack-token from omneval-secret when existingSecret is set.
    token: ""
    # Name of a pre-existing Secret holding the Quack auth token.
    # When set, existingSecretKey identifies the key within that Secret.
    existingSecret: ""
    # Key inside existingSecret that holds the token value.
    existingSecretKey: "token"
    # Catalog driver: "postgres" (prod, shares the metadata Postgres) or
    # "duckdb" (local single-writer catalog file, demo profile).
    catalogDriver: "duckdb"
    # Catalog DSN override. When empty and catalogDriver is "postgres", the
    # chart derives this from the postgresql section (same as database.dsn).
    # When catalogDriver is "duckdb", this is the local catalog file path on
    # the quack-server PVC.
    catalogDSN: ""
    # Where Lake Parquet files live. When empty, derived from storage.bucket
    # (s3://<bucket>/lake) or a local path on the PVC for the demo profile.
    dataPath: ""
    # Table Maintenance scheduler interval (compaction, snapshot expiry,
    # retention GC). 15m rather than a shorter cadence: each pass's
    # rewrite/merge writes a new merge-lineage Parquet generation, so a
    # shorter interval creates more of these than light workloads need.
    maintenanceInterval: "15m"
    # Lake-native retention (#92): DELETEs aged spans/scores via the Catalog.
    retention:
      enabled: false
      maxAgeDays: 0
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: 200m
        memory: 256Mi
    nodeSelector: {}
    affinity: {}
    tolerations: []
    annotations: {}
    labels: {}
    serviceAccount:
      create: false
      name: ""
  # PVC for the quack-server local catalog/data path. Only created when
  # catalogDriver is "duckdb" (demo profile / local single-writer catalog).
  pvc:
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  # Client configuration shared by Writer, Query API, and Eval — every
  # service that attaches to the Lake as a Quack client.
  client:
    # Quack Server address. Empty derives "<release>-quack-server:9494".
    url: ""
    # Lake Parquet data path, read directly by clients for DATA_PATH in the
    # ATTACH statement. Empty derives the same default as quack.server.dataPath.
    dataPath: ""

# ============================================================================
# Storage (S3-compatible object store)
# ============================================================================
storage:
  # S3 endpoint URL (e.g. http://minio:9000). If empty, no S3 integration.
  endpoint: ""
  # S3 bucket name (e.g. "omneval")
  bucket: ""
  # S3 region
  region: "us-east-1"
  # Access key ID. Plaintext in values/valuesFrom — not recommended for
  # production/GitOps. Prefer existingSecret below. Ignored when
  # existingSecret is set.
  accessKey: ""
  # Secret access key. Same caveat as accessKey above.
  secretKey: ""
  # Name of a pre-existing Secret holding the S3 access key + secret key.
  # When set, accessKey/secretKey above are ignored and the chart does NOT
  # write storage-access-key/storage-secret-key into omneval-secret — pods
  # source the credentials from this Secret instead via secretKeyRef. This
  # is the recommended approach for GitOps workflows (Flux, ArgoCD) and for
  # external S3-compatible providers (e.g. Cloudflare R2) where credentials
  # come from a vault-synced Secret rather than plaintext values.
  #
  # Example:
  #   storage:
  #     existingSecret: my-r2-credentials
  #     existingSecretAccessKeyKey: access-key
  #     existingSecretSecretKeyKey: secret-key
  existingSecret: ""
  # Key inside existingSecret that holds the access key ID.
  existingSecretAccessKeyKey: "access-key"
  # Key inside existingSecret that holds the secret access key.
  existingSecretSecretKeyKey: "secret-key"

# ============================================================================
# MinIO (S3-compatible object store)
#
# Set enabled: false to use an external S3-compatible store.
# When enabled: false, configure storage.endpoint/credentials instead.
# ============================================================================
minio:
  enabled: false
  # Internal MinIO settings (when enabled: true)
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  # MinIO service account credentials (auto-generated if not set)
  rootUser: minio
  rootPassword: minio123
  # MinIO resources
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  # MinIO PVC for data storage
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  # Service type (ClusterIP by default)
  service:
    type: ClusterIP
    port: 9000
    consolePort: 9001
  # Node selector, affinity, tolerations
  nodeSelector: {}
  affinity: {}
  tolerations: []

# ============================================================================
# Metadata database (PostgreSQL)
#
# Set enabled: false to use an external PostgreSQL or SQLite.
# When enabled: false, configure database.dsn manually.
# ============================================================================
database:
  # Driver: "postgres" or "sqlite"
  driver: "postgres"
  # DSN — generated automatically from postgresql when driver is postgres and enabled
  # Override manually when using sqlite or external postgres
  dsn: ""

# ============================================================================
# PostgreSQL (metadata store)
#
# Set enabled: false to use an external PostgreSQL instance.
# When enabled: false, configure database.dsn to point to your DB.
# ============================================================================
postgresql:
  enabled: true
  # When external, specify the connection details
  external:
    host: ""
    port: 5432
    database: ""
    user: ""
    password: ""
    sslmode: "disable"
  # Internal PostgreSQL settings (when enabled: true)
  auth:
    # Database username
    username: omneval
    # Database password
    password: omneval
    # Database name
    database: omneval
    # Secret key to use for the password (if using existing secret)
    existingSecret: ""
  primary:
    persistence:
      size: 10Gi
      storageClass: ""
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    service:
      port: 5432
  # Read replica configuration (optional)
  readReplicas:
    replicaCount: 0
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# ============================================================================
# Redis (message broker / queue store)
#
# Set enabled: false to use an external Redis instance.
# When enabled: false, configure redis.external.addr and credentials.
# ============================================================================
redis:
  enabled: true
  # When external, specify the connection details
  external:
    addr: ""
    password: ""
  # Internal Redis settings (when enabled: true)
  auth:
    enabled: false
    password: ""
  master:
    # Number of replicas (0 for single-instance)
    replicas: 0
    persistence:
      enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    service:
      port: 6379
  # Node selector, affinity, tolerations
  nodeSelector: {}
  affinity: {}
  tolerations: []

# ============================================================================
# Ingress (optional)
# ============================================================================
ingress:
  enabled: false
  # Class name (e.g. "nginx", "alb")
  className: ""
  # Ingest API ingress
  ingest:
    host: ""
    paths:
      - path: /
        pathType: Prefix
    tls: []
  # Query API (UI) ingress
  query:
    host: ""
    paths:
      - path: /
        pathType: Prefix
    tls: []

# ============================================================================
# HTTPRoute (optional — Gateway API)
#
# Use this instead of `ingress` when your cluster routes traffic through the
# Gateway API (e.g. Traefik, Cilium, or Istio gateways). TLS is expected to
# terminate at the Gateway listener referenced by parentRefs, so no per-route
# TLS is configured here. The query (UI) and ingest hosts are independent.
# ============================================================================
httpRoute:
  enabled: false
  # parentRefs point at the Gateway (and optionally a named listener/section).
  parentRefs: []
    # - name: traefik-gateway
    #   namespace: traefik
    #   sectionName: websecure
  # Annotations applied to every generated HTTPRoute.
  annotations: {}
  # Query API (UI) route
  query:
    host: ""
  # Ingest API route
  ingest:
    host: ""

# ============================================================================
# Metrics
# ============================================================================
metrics:
  # Listen address for Prometheus /metrics endpoint (override via OMNEVAL_METRICS_ADDR)
  addr: ":9090"
  # Disable per-project label cardinality on all metrics
  disableProjectLabels: false
