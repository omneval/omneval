{{- /*
Lantern Secret — sensitive values for production deployments.

This Secret holds S3 credentials, Redis password, admin bootstrap credentials,
the judge LLM API key, and the PostgreSQL DSN (when using Postgres metadata store).
Values are base64-encoded as required by Kubernetes.

Infrastructure resolution:
- When a component is internal (redis.enabled, postgresql.enabled, minio.enabled),
  secrets are generated from the component's auth settings.
- When a component is external (enabled: false with external.* set), secrets
  are taken from the external.* values.
*/ -}}
{{- $name := .Release.Name -}}
{{- $storageEndpoint := "" -}}
{{- if .Values.minio.enabled -}}
  {{- $storageEndpoint = printf "http://%s-minio:9000" $name -}}
{{- else if .Values.storage.endpoint -}}
  {{- $storageEndpoint = .Values.storage.endpoint -}}
{{- else if .Values.minio.external.endpoint -}}
  {{- $storageEndpoint = .Values.minio.external.endpoint -}}
{{- end -}}
{{- $storageAccessKey := "" -}}
{{- $storageSecretKey := "" -}}
{{- if .Values.storage.accessKey -}}
  {{- $storageAccessKey = .Values.storage.accessKey -}}
  {{- $storageSecretKey = .Values.storage.secretKey -}}
{{- else if .Values.minio.enabled -}}
  {{- $storageAccessKey = .Values.minio.rootUser -}}
  {{- $storageSecretKey = .Values.minio.rootPassword -}}
{{- else if .Values.minio.external.accessKey -}}
  {{- $storageAccessKey = .Values.minio.external.accessKey -}}
  {{- $storageSecretKey = .Values.minio.external.secretKey -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-secret
  labels:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/instance: {{ $name }}
type: Opaque
stringData:
  {{- /* Storage credentials */ -}}
  {{- if $storageAccessKey }}
  storage-access-key: {{ $storageAccessKey | quote }}
  {{- end }}
  {{- if $storageSecretKey }}
  storage-secret-key: {{ $storageSecretKey | quote }}
  {{- end }}
  {{- /* Eval LLM API key */ -}}
  {{- with .Values.eval.llmAPIKey }}
  eval-llm-api-key: {{ . | quote }}
  {{- end }}
  {{- /* Redis password */ -}}
  {{- if and .Values.redis.enabled .Values.redis.auth.enabled .Values.redis.auth.password }}
  redis-password: {{ .Values.redis.auth.password | quote }}
  {{- else if .Values.redis.external.password }}
  redis-password: {{ .Values.redis.external.password | quote }}
  {{- end }}
  {{- /* Admin bootstrap credentials */ -}}
  {{- with .Values.query.adminPassword }}
  admin-password: {{ . | quote }}
  {{- end }}
  {{- with .Values.query.adminEmail }}
  admin-email: {{ . | quote }}
  {{- end }}
  {{- /* PostgreSQL DSN */ -}}
  {{- if and (eq .Values.database.driver "postgres") .Values.postgresql.enabled }}
  postgres-dsn: postgres://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ $name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable
  {{- else if and (eq .Values.database.driver "postgres") .Values.postgresql.external.host }}
  postgres-dsn: postgres://{{ .Values.postgresql.external.user }}:{{ .Values.postgresql.external.password }}@{{ .Values.postgresql.external.host }}:{{ .Values.postgresql.external.port }}/{{ .Values.postgresql.external.database }}?sslmode={{ .Values.postgresql.external.sslmode }}
  {{- else if .Values.database.dsn }}
  postgres-dsn: {{ .Values.database.dsn }}
  {{- end }}
  {{- /* PostgreSQL password (for internal use) */ -}}
  {{- if .Values.postgresql.enabled }}
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
