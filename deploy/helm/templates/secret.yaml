{{- /*
Omneval Secret — sensitive values for production deployments.

This Secret holds S3 credentials, Redis password, admin bootstrap credentials,
the judge LLM API key, and the PostgreSQL DSN (when using Postgres metadata store).
Values are base64-encoded as required by Kubernetes.

Infrastructure resolution:
- When a component is internal (redis.enabled, postgresql.enabled, minio.enabled),
  secrets are generated from the component's auth settings.
- When a component is external (enabled: false with external.* set), secrets
  are taken from the external.* values.
*/ -}}
{{- $name := .Release.Name -}}
{{- $storageEndpoint := include "omneval.storageEndpoint" . -}}
{{- $storageAccessKey := include "omneval.storageAccessKey" . -}}
{{- $storageSecretKey := include "omneval.storageSecretKey" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-secret
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
type: Opaque
stringData:
  {{- /* Storage credentials */ -}}
  {{- if $storageAccessKey }}
  storage-access-key: {{ $storageAccessKey | quote }}
  {{- end }}
  {{- if $storageSecretKey }}
  storage-secret-key: {{ $storageSecretKey | quote }}
  {{- end }}
  {{- /* Eval LLM API key */ -}}
  {{- with .Values.eval.llmAPIKey }}
  eval-llm-api-key: {{ . | quote }}
  {{- end }}
  {{- /* Redis password */ -}}
  {{- $redisPassword := include "omneval.redisPassword" . -}}
  {{- if $redisPassword }}
  redis-password: {{- if .Values.redis.external.password }} {{ .Values.redis.external.password | quote }}{{- else }} {{ .Values.redis.auth.password | quote }}{{- end }}
  {{- end }}
  {{- /* Admin bootstrap credentials */ -}}
  {{- with .Values.query.adminPassword }}
  admin-password: {{ . | quote }}
  {{- end }}
  {{- with .Values.query.adminEmail }}
  admin-email: {{ . | quote }}
  {{- end }}
  {{- /* PostgreSQL DSN */ -}}
  {{- $pgDsn := include "omneval.postgresDsn" . -}}
  {{- if and (eq .Values.database.driver "postgres") $pgDsn }}
  postgres-dsn: {{ $pgDsn }}
  {{- end }}
  {{- /* PostgreSQL password (for internal use) */ -}}
  {{- if .Values.postgresql.enabled }}
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
  {{- /* Quack auth token, shared by quack-server and its clients (ADR-0005) */}}
  quack-token: {{ include "omneval.quackToken" . | quote }}
