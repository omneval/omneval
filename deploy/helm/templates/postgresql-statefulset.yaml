{{- /*
PostgreSQL StatefulSet — metadata store for Omneval.

Deployed when postgresql.enabled is true. Creates a StatefulSet with
a single primary replica. Persistent storage is backed by a PVC.

External mode: set postgresql.enabled: false and configure postgresql.external
with host, port, database, user, and password.
*/ -}}
{{- if .Values.postgresql.enabled -}}
{{- $name := .Release.Name -}}
{{- $auth := .Values.postgresql.auth -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-postgresql
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: postgresql
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: {{ .Values.postgresql.primary.service.port }}
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}-postgresql
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: postgresql
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  serviceName: {{ $name }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omneval
      app.kubernetes.io/instance: {{ $name }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omneval
        app.kubernetes.io/instance: {{ $name }}
        app.kubernetes.io/component: postgresql
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: postgresql
          image: "docker.io/library/postgres:16-alpine"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ $auth.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ $auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ $auth.database | quote }}
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          command:
            - postgres
            - -c
            - config_file=/etc/postgresql/postgresql.conf
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: postgresql-config
              mountPath: /etc/postgresql
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ $auth.username }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ $auth.username }}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.postgresql.primary.resources | nindent 12 }}
      volumes:
        - name: postgresql-config
          configMap:
            name: {{ $name }}-postgresql-config
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.postgresql.primary.persistence.storageClass }}
        storageClassName: {{ .Values.postgresql.primary.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.primary.persistence.size }}
---
# PostgreSQL configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-postgresql-config
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: postgresql
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 100
    shared_buffers = 128MB
    dynamic_shared_memory_type = posix
    log_min_duration_statement = 1000
    tcp_keepalives_idle = 60
    tcp_keepalives_interval = 10
    tcp_keepalives_count = 6
---
# ServiceAccount for PostgreSQL (if needed for RBAC)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-postgresql
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: postgresql
automountServiceAccountToken: false
{{- end }}
