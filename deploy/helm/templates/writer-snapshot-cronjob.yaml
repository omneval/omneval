{{- /*
Writer VolumeSnapshot CronJob — periodic PVC backup using the
Kubernetes VolumeSnapshot API.

Creates a VolumeSnapshot of the writer PVC on a configurable schedule
(default: daily at 02:00 UTC). This bounds hot-store data loss to the
snapshot interval rather than the full recovery window.

Requires:
  - VolumeSnapshot CRDs installed (snapshot.storage.k8s.io/v1)
  - A VolumeSnapshotClass provisioned by your cloud CSI driver
  - Storage driver that supports volume snapshots (EBS, GCE PD, Azure Disk, etc.)
*/ -}}
{{- $name := .Release.Name -}}
{{- if .Values.writer.volumeSnapshot.enabled }}
---
# ServiceAccount for the CronJob (has permissions to create VolumeSnapshots)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-volume-snapshot
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
    app.kubernetes.io/part-of: omneval
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: false
---
# ClusterRole with permissions for VolumeSnapshot operations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}-volume-snapshot
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
    app.kubernetes.io/part-of: omneval
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents"]
    verbs: ["get", "list", "watch"]
---
# Bind the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}-volume-snapshot
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
    app.kubernetes.io/part-of: omneval
subjects:
  - kind: ServiceAccount
    name: {{ $name }}-volume-snapshot
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ $name }}-volume-snapshot
  apiGroup: rbac.authorization.k8s.io
---
# ConfigMap holding the VolumeSnapshotClass name
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-volume-snapshot-config
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
    app.kubernetes.io/part-of: omneval
data:
  snapshot-class: {{ .Values.writer.volumeSnapshot.snapshotClass | quote }}
---
# CronJob that creates a VolumeSnapshot of the writer PVC
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $name }}-writer-volume-snapshot
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
    app.kubernetes.io/part-of: omneval
spec:
  schedule: {{ .Values.writer.volumeSnapshot.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: {{ $name }}-volume-snapshot
          containers:
            - name: snapshot
              image: bitnami/kubectl:latest
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  SNAPSHOT_NAME="omneval-writer-$(date +%Y%m%d-%H%M%S)"
                  VOLUME_SNAPSHOT_CLASS="${VOLUME_SNAPSHOT_CLASS:?VOLUME_SNAPSHOT_CLASS is required}"
                  PVC_NAME="${PVC_NAME:-{{ $name }}-writer-data-0}"
                  NAMESPACE="{{ .Release.Namespace }}"

                  echo "Creating VolumeSnapshot $SNAPSHOT_NAME"
                  echo "  Source PVC:       $PVC_NAME"
                  echo "  Snapshot class:   $VOLUME_SNAPSHOT_CLASS"
                  echo "  Namespace:        $NAMESPACE"

                  PVC_STORAGE_CLASS=$(kubectl get pvc "$PVC_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.storageClassName}')
                  SOURCE_PV=$(kubectl get pvc "$PVC_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.volumeName}')
                  echo "  PVC StorageClass: $PVC_STORAGE_CLASS"
                  echo "  Source PV:        $SOURCE_PV"

                  # Create the VolumeSnapshot from the PVC using the configured snapshot class
                  kubectl create volumesnapshot "$SNAPSHOT_NAME" \
                    --namespace "$NAMESPACE" \
                    --source=pvc/"$PVC_NAME" \
                    --snapshotclass="$VOLUME_SNAPSHOT_CLASS" \
                    --verbose 2>&1

                  echo "Snapshot created successfully: $SNAPSHOT_NAME"
                  kubectl get volumesnapshot "$SNAPSHOT_NAME" -n "$NAMESPACE" -o wide
              env:
                - name: VOLUME_SNAPSHOT_CLASS
                  valueFrom:
                    configMapKeyRef:
                      name: {{ $name }}-volume-snapshot-config
                      key: snapshot-class
                      optional: false
                - name: PVC_NAME
                  value: "{{ $name }}-writer-data-0"
                - name: NAMESPACE
                  value: "{{ .Release.Namespace }}"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          restartPolicy: OnFailure
{{- end }}
