{{- /*
Writer Service — exposes the score handler port (8001) and metrics (9090).

The Writer is a stateless, horizontally scalable Deployment (#90 cutover).
Eval Workers use this service for score write-back (internal-only, not
exposed externally), and it load-balances across all Writer replicas.
*/ -}}
{{- $name := .Release.Name -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-writer
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
