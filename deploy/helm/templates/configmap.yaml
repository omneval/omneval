{{- /*
Omneval YAML configuration ConfigMap.

This ConfigMap holds the omneval.yaml configuration that all Omneval services
share. Environment variable overrides in each Deployment handle per-service
secrets (S3 credentials, admin credentials, LLM keys, Redis credentials).

Infrastructure resolution:
- When a component is enabled internally (redis.enabled, postgresql.enabled,
  minio.enabled), the ConfigMap uses the internal service DNS name.
- When a component is external (enabled: false with external.* set), the
  ConfigMap uses the external values.
- When no external values are set, the section is omitted from the config.
*/ -}}
{{- $name := .Release.Name -}}
{{- $redisAddr := include "omneval.redisAddr" . -}}
{{- $pgDsn := include "omneval.postgresDsn" . -}}
{{- $storageEndpoint := include "omneval.storageEndpoint" . -}}
{{- $storageBucket := include "omneval.storageBucket" . -}}
{{- $quackAddr := include "omneval.quackServerAddr" . -}}
{{- $quackDataPath := include "omneval.quackDataPath" . -}}
{{- $quackCatalogDSN := include "omneval.quackCatalogDSN" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  omneval.yaml: |
    {{- if $redisAddr }}
    redis:
      addr: {{ $redisAddr | quote }}
    {{- end }}
    {{- if $pgDsn }}
    database:
      driver: {{ .Values.database.driver }}
      dsn: {{ $pgDsn | quote }}
    {{- end }}
    {{- if $storageEndpoint }}
    storage:
      endpoint: {{ $storageEndpoint | quote }}
      {{- with $storageBucket }}
      bucket: {{ . | quote }}
      {{- end }}
      {{- with .Values.storage.region }}
      region: {{ . | quote }}
      {{- end }}
    {{- end }}
    auth:
      session_ttl: {{ .Values.query.sessionTTL }}
      secure_cookie: {{ .Values.query.secureCookie }}
    ingest:
      addr: {{ .Values.ingest.addr }}
      log_system_prompt: {{ .Values.ingest.logSystemPrompt }}
      cors_allowed_origins:
        {{- range .Values.ingest.corsAllowedOrigins }}
        - {{ . | quote }}
        {{- end }}
    writer:
      addr: {{ .Values.writer.addr }}
    query:
      addr: {{ .Values.query.addr }}
    eval:
      concurrency: {{ .Values.eval.concurrency }}
      judge_timeout: {{ .Values.eval.judgeTimeout }}
      retry_count: {{ .Values.eval.retryCount }}
    metrics:
      addr: {{ .Values.metrics.addr }}
      disable_project_labels: {{ .Values.metrics.disableProjectLabels }}
    quack:
      server:
        listen_addr: {{ .Values.quack.server.listenAddr | quote }}
        catalog_driver: {{ .Values.quack.server.catalogDriver | quote }}
        catalog_dsn: {{ $quackCatalogDSN | quote }}
        data_path: {{ $quackDataPath | quote }}
        maintenance_interval: {{ .Values.quack.server.maintenanceInterval | quote }}
        retention:
          enabled: {{ .Values.quack.server.retention.enabled }}
          max_age_days: {{ .Values.quack.server.retention.maxAgeDays }}
        backup:
          enabled: {{ .Values.quack.server.backup.enabled }}
          interval: {{ .Values.quack.server.backup.interval | quote }}
          keep_count: {{ .Values.quack.server.backup.keepCount }}
      client:
        url: {{ $quackAddr | quote }}
        data_path: {{ (.Values.quack.client.dataPath | default $quackDataPath) | quote }}
