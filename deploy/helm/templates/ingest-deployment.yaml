{{- /*
Ingest API Deployment — stateless, horizontally scalable.

Accepts OTLP (proto+JSON) and native REST spans, validates API keys,
translates OTLP to domain spans, and enqueues JSON batches to Redis.

Infrastructure resolution:
- Redis: uses internal service name when redis.enabled, or redis.external.addr
- Storage: uses internal MinIO when minio.enabled, or storage endpoint
- Auth: admin credentials from secret (optional)
*/ -}}
{{- $name := .Release.Name -}}
{{- $redisPassword := "" -}}
{{- if and .Values.redis.enabled .Values.redis.auth.enabled .Values.redis.auth.password }}
  {{- $redisPassword = "redis-password" -}}
{{- else if .Values.redis.external.password }}
  {{- $redisPassword = "redis-password" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-ingest
  labels:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: ingest
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.ingest.autoscaling.enabled }}
  replicas: {{ .Values.ingest.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: lantern
      app.kubernetes.io/instance: {{ $name }}
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lantern
        app.kubernetes.io/instance: {{ $name }}
        app.kubernetes.io/component: ingest
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.ingest.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.ingest.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.ingest.serviceAccount.create }}
      serviceAccountName: {{ $name }}-ingest
      {{- end }}
      {{- with .Values.ingest.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingest.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingest.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ingest
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["lantern-ingest"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: LANTERN_CONFIG
              value: "/etc/lantern/lantern.yaml"
            - name: LANTERN_AUTH_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: admin-email
                  optional: true
            - name: LANTERN_AUTH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: admin-password
                  optional: true
            {{- if $redisPassword }}
            - name: LANTERN_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: redis-password
            {{- end }}
            {{- with .Values.storage.endpoint }}
            - name: LANTERN_STORAGE_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.bucket }}
            - name: LANTERN_STORAGE_BUCKET
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.region }}
            - name: LANTERN_STORAGE_REGION
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.storage.endpoint }}
            - name: LANTERN_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: storage-access-key
                  optional: true
            - name: LANTERN_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: storage-secret-key
                  optional: true
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/lantern
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.ingest.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ $name }}-config
---
{{- if .Values.ingest.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-ingest
  labels:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: ingest
automountServiceAccountToken: false
{{- end }}
{{- if .Values.ingest.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}-ingest
  labels:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: ingest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}-ingest
  minReplicas: {{ .Values.ingest.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.ingest.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.ingest.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.ingest.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.ingest.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.ingest.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
