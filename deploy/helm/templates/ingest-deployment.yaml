{{- /*
Ingest API Deployment — stateless, horizontally scalable.

Accepts OTLP (proto+JSON) and native REST spans, validates API keys,
translates OTLP to domain spans, and enqueues JSON batches to Redis.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingest
  labels:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ingest
    {{- with .Values.ingest.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.ingest.autoscaling }}
  replicas: {{ .Values.ingest.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: lantern
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lantern
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: ingest
        {{- with .Values.ingest.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.ingest.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.ingest.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingest.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingest.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ingest
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["lantern-ingest"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: LANTERN_CONFIG
              value: "/etc/lantern/lantern.yaml"
            - name: LANTERN_AUTH_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: admin-email
                  optional: true
            - name: LANTERN_AUTH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: admin-password
                  optional: true
            {{- if .Values.redis.enabled }}
            - name: LANTERN_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: redis-password
                  optional: true
            {{- end }}
            {{- with .Values.storage.endpoint }}
            - name: LANTERN_STORAGE_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.bucket }}
            - name: LANTERN_STORAGE_BUCKET
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.region }}
            - name: LANTERN_STORAGE_REGION
              value: {{ . | quote }}
            {{- end }}
            {{- if or .Values.storage.accessKey .Values.storage.endpoint }}
            - name: LANTERN_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: storage-access-key
                  optional: true
            - name: LANTERN_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: storage-secret-key
                  optional: true
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/lantern
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.ingest.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
