{{- /*
Ingest API Service — exposes the Ingest API port (8000) and metrics (9090).
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ingest
  labels:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ingest
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ingest
