{{- /*
Eval Workers Deployment — horizontally scalable.

Drains the Redis eval queue, calls the judge LLM, and writes scores
back to the Writer Service via REST with exponential backoff.
No HTTP port — workers are consumers, not servers.

Infrastructure resolution:
- Redis: uses internal service name when redis.enabled, or redis.external.addr
- Database: uses internal PostgreSQL when postgresql.enabled, or postgresql.external
*/ -}}
{{- $name := .Release.Name -}}
{{- $redisPassword := include "omneval.redisPassword" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-eval
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: eval
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.eval.autoscaling.enabled }}
  replicas: {{ .Values.eval.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: omneval
      app.kubernetes.io/instance: {{ $name }}
      app.kubernetes.io/component: eval
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omneval
        app.kubernetes.io/instance: {{ $name }}
        app.kubernetes.io/component: eval
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.eval.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ toYaml .Values | sha256sum }}
        {{- with .Values.eval.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.eval.serviceAccount.create }}
      serviceAccountName: {{ $name }}-eval
      {{- end }}
      {{- with .Values.eval.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.eval.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.eval.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: eval
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["omneval-eval"]
          env:
            - name: OMNEVAL_CONFIG
              value: "/etc/omneval/omneval.yaml"
            {{- if $redisPassword }}
            - name: OMNEVAL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: redis-password
            {{- end }}
            {{- with .Values.storage.endpoint }}
            - name: OMNEVAL_STORAGE_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.bucket }}
            - name: OMNEVAL_STORAGE_BUCKET
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.region }}
            - name: OMNEVAL_STORAGE_REGION
              value: {{ . | quote }}
            {{- end }}
            {{- if or (include "omneval.storageAccessKey" .) .Values.storage.existingSecret }}
            - name: OMNEVAL_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "omneval.storageSecret" . }}
                  key: {{ include "omneval.storageAccessKeySecretKey" . }}
                  optional: true
            - name: OMNEVAL_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "omneval.storageSecret" . }}
                  key: {{ include "omneval.storageSecretKeySecretKey" . }}
                  optional: true
            {{- end }}
            - name: OMNEVAL_QUACK_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "omneval.quackSecret" . }}
                  key: {{ include "omneval.quackSecretKey" . }}
            {{- if .Values.eval.llmBaseURL }}
            - name: OMNEVAL_EVAL_LLM_BASE_URL
              value: {{ .Values.eval.llmBaseURL | quote }}
            {{- end }}
            {{- if .Values.eval.llmModel }}
            - name: OMNEVAL_EVAL_LLM_MODEL
              value: {{ .Values.eval.llmModel | quote }}
            {{- end }}
            {{- if .Values.eval.llmAPIKey }}
            - name: OMNEVAL_EVAL_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: eval-llm-api-key
                  optional: true
            {{- end }}
            {{- if .Values.database.dsn }}
            - name: OMNEVAL_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: postgres-dsn
                  optional: true
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/omneval
              readOnly: true
          livenessProbe:
            exec:
              command:
                - cat
                - /proc/1/status
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            {{- toYaml .Values.eval.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ $name }}-config
---
{{- if .Values.eval.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-eval
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: eval
automountServiceAccountToken: false
{{- end }}
{{- if .Values.eval.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}-eval
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: eval
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}-eval
  minReplicas: {{ .Values.eval.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.eval.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.eval.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.eval.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.eval.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.eval.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
