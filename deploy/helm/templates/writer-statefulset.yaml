{{- /*
Writer StatefulSet — single-replica, owns the DuckDB PVC.

Drains the Redis ingest queue, writes to DuckDB, syncs snapshots to S3,
flushes aged partitions as Parquet, and serves POST /internal/v1/scores.
*/ -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-writer
  labels:
    app.kubernetes.io/name: lantern
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: writer
    {{- with .Values.writer.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  serviceName: {{ .Release.Name }}-writer
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lantern
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lantern
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: writer
        {{- with .Values.writer.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.writer.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.writer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.writer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.writer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: writer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["lantern-writer"]
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: LANTERN_CONFIG
              value: "/etc/lantern/lantern.yaml"
            {{- if .Values.redis.enabled }}
            - name: LANTERN_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: redis-password
                  optional: true
            {{- end }}
            {{- with .Values.storage.endpoint }}
            - name: LANTERN_STORAGE_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.bucket }}
            - name: LANTERN_STORAGE_BUCKET
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.region }}
            - name: LANTERN_STORAGE_REGION
              value: {{ . | quote }}
            {{- end }}
            {{- if or .Values.storage.accessKey .Values.storage.endpoint }}
            - name: LANTERN_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: storage-access-key
                  optional: true
            - name: LANTERN_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: storage-secret-key
                  optional: true
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/lantern
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.writer.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.pvc.accessMode }}
        {{- if .Values.pvc.storageClass }}
        storageClassName: {{ .Values.pvc.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.pvc.size }}
