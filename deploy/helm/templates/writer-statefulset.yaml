{{- /*
Writer StatefulSet — single-replica, owns the DuckDB PVC.

Drains the Redis ingest queue, writes to DuckDB, syncs snapshots to S3,
flushes aged partitions as Parquet, and serves POST /internal/v1/scores.

Infrastructure resolution:
- Redis: uses internal service name when redis.enabled, or redis.external.addr
- Storage: uses internal MinIO when minio.enabled, or storage endpoint
*/ -}}
{{- $name := .Release.Name -}}
{{- $redisPassword := include "omneval.redisPassword" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}-writer
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  serviceName: {{ $name }}-writer
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omneval
      app.kubernetes.io/instance: {{ $name }}
      app.kubernetes.io/component: writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omneval
        app.kubernetes.io/instance: {{ $name }}
        app.kubernetes.io/component: writer
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.writer.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.writer.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.writer.serviceAccount.create }}
      serviceAccountName: {{ $name }}-writer
      {{- end }}
      {{- with .Values.writer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.writer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.writer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: writer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["omneval-writer"]
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: OMNEVAL_CONFIG
              value: "/etc/omneval/omneval.yaml"
            {{- if $redisPassword }}
            - name: OMNEVAL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: redis-password
            {{- end }}
            {{- with .Values.storage.endpoint }}
            - name: OMNEVAL_STORAGE_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.bucket }}
            - name: OMNEVAL_STORAGE_BUCKET
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.region }}
            - name: OMNEVAL_STORAGE_REGION
              value: {{ . | quote }}
            {{- end }}
            {{- if include "omneval.storageAccessKey" . }}
            - name: OMNEVAL_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: storage-access-key
                  optional: true
            - name: OMNEVAL_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: storage-secret-key
                  optional: true
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/omneval
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.writer.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ $name }}-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.pvc.accessMode }}
        {{- if .Values.pvc.storageClass }}
        storageClassName: {{ .Values.pvc.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.pvc.size }}
---
{{- if .Values.writer.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-writer
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
automountServiceAccountToken: false
{{- end }}
