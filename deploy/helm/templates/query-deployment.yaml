{{- /*
Query API Deployment — fully stateless, horizontally scalable.

Downloads the DuckDB snapshot from S3, polls for updates, and serves
the REST API, analytics, prompt registry, auth, and embedded React SPA.
No PVC — all data comes from S3 snapshot and metadata store.

Infrastructure resolution:
- Database: uses internal PostgreSQL when postgresql.enabled, or postgresql.external
- Storage: uses internal MinIO when minio.enabled, or storage endpoint
*/ -}}
{{- $name := .Release.Name -}}
{{- $redisPassword := include "omneval.redisPassword" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-query
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: query
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.query.autoscaling.enabled }}
  replicas: {{ .Values.query.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: omneval
      app.kubernetes.io/instance: {{ $name }}
      app.kubernetes.io/component: query
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omneval
        app.kubernetes.io/instance: {{ $name }}
        app.kubernetes.io/component: query
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.query.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.query.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.query.serviceAccount.create }}
      serviceAccountName: {{ $name }}-query
      {{- end }}
      {{- with .Values.query.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.query.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.query.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: query
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["omneval-query"]
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: OMNEVAL_CONFIG
              value: "/etc/omneval/omneval.yaml"
            - name: OMNEVAL_AUTH_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: admin-email
                  optional: true
            - name: OMNEVAL_AUTH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: admin-password
                  optional: true
            {{- if $redisPassword }}
            - name: OMNEVAL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: redis-password
            {{- end }}
            {{- with .Values.storage.endpoint }}
            - name: OMNEVAL_STORAGE_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.bucket }}
            - name: OMNEVAL_STORAGE_BUCKET
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.region }}
            - name: OMNEVAL_STORAGE_REGION
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.storage.endpoint }}
            - name: OMNEVAL_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: storage-access-key
                  optional: true
            - name: OMNEVAL_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: storage-secret-key
                  optional: true
            {{- end }}
            {{- if .Values.database.dsn }}
            - name: OMNEVAL_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: postgres-dsn
                  optional: true
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/omneval
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            {{- toYaml .Values.query.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ $name }}-config
---
{{- if .Values.query.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-query
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: query
automountServiceAccountToken: false
{{- end }}
{{- if .Values.query.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}-query
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: query
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}-query
  minReplicas: {{ .Values.query.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.query.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.query.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.query.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.query.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.query.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
