{{- /*
Writer Deployment — stateless, horizontally scalable (#90 cutover).

Drains the Redis ingest queue, commits batches to the Lake (DuckLake via
the Quack Server), and serves POST /internal/v1/scores. No PVC: the Writer
no longer owns a local DuckDB file once Lake mode is the only mode
(ADR-0004, ADR-0005).

Infrastructure resolution:
- Redis: uses internal service name when redis.enabled, or redis.external.addr
- Storage: uses internal MinIO when minio.enabled, or storage endpoint
*/ -}}
{{- $name := .Release.Name -}}
{{- $redisPassword := include "omneval.redisPassword" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-writer
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.writer.autoscaling.enabled }}
  replicas: {{ .Values.writer.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: omneval
      app.kubernetes.io/instance: {{ $name }}
      app.kubernetes.io/component: writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omneval
        app.kubernetes.io/instance: {{ $name }}
        app.kubernetes.io/component: writer
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.writer.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.writer.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.writer.serviceAccount.create }}
      serviceAccountName: {{ $name }}-writer
      {{- end }}
      {{- with .Values.writer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.writer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.writer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: writer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["omneval-writer"]
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: OMNEVAL_CONFIG
              value: "/etc/omneval/omneval.yaml"
            {{- if $redisPassword }}
            - name: OMNEVAL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: redis-password
            {{- end }}
            {{- with .Values.storage.endpoint }}
            - name: OMNEVAL_STORAGE_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.bucket }}
            - name: OMNEVAL_STORAGE_BUCKET
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.storage.region }}
            - name: OMNEVAL_STORAGE_REGION
              value: {{ . | quote }}
            {{- end }}
            {{- if include "omneval.storageAccessKey" . }}
            - name: OMNEVAL_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: storage-access-key
                  optional: true
            - name: OMNEVAL_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: storage-secret-key
                  optional: true
            {{- end }}
            - name: OMNEVAL_QUACK_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}-secret
                  key: quack-token
          volumeMounts:
            - name: config
              mountPath: /etc/omneval
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.writer.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ $name }}-config
---
{{- if .Values.writer.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-writer
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
automountServiceAccountToken: false
{{- end }}
{{- if .Values.writer.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}-writer
  labels:
    app.kubernetes.io/name: omneval
    app.kubernetes.io/instance: {{ $name }}
    app.kubernetes.io/component: writer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}-writer
  minReplicas: {{ .Values.writer.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.writer.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.writer.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.writer.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.writer.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.writer.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
