---
suite: ingest storage credentials
templates:
  - ingest-deployment.yaml
tests:
  - it: should read storage credentials from the shared secret by default
    set:
      storage.endpoint: "http://minio:9000"
      storage.bucket: "omneval"
      storage.accessKey: "AKIAIOSFODNN7EXAMPLE"
      storage.secretKey: "secret"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_STORAGE_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-secret
                key: storage-access-key
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_STORAGE_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-secret
                key: storage-secret-key
                optional: true

  - it: should read storage credentials from existingSecret when set
    set:
      storage.endpoint: "https://example.r2.cloudflarestorage.com"
      storage.bucket: "omneval"
      storage.existingSecret: "my-r2-credentials"
      storage.existingSecretAccessKeyKey: "access-key-id"
      storage.existingSecretSecretKeyKey: "secret-access-key"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_STORAGE_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: my-r2-credentials
                key: access-key-id
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_STORAGE_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: my-r2-credentials
                key: secret-access-key
                optional: true

  - it: should use default existingSecret keys when only existingSecret is set
    set:
      storage.endpoint: "https://example.r2.cloudflarestorage.com"
      storage.bucket: "omneval"
      storage.existingSecret: "my-r2-credentials"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_STORAGE_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: my-r2-credentials
                key: access-key
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_STORAGE_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: my-r2-credentials
                key: secret-key
                optional: true

