---
suite: external infrastructure
templates:
  - configmap.yaml
tests:
  - it: should use external redis addr in configmap
    set:
      redis.enabled: false
      redis.external.addr: "redis.mycompany.com:6379"
      redis.external.password: "externalpass"
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'redis.mycompany.com:6379'
  - it: should use external postgres in configmap
    set:
      postgresql.enabled: false
      postgresql.external.host: "pg.mycompany.com"
      postgresql.external.port: 5432
      postgresql.external.database: "omneval"
      postgresql.external.user: "omneval"
      postgresql.external.password: "secret"
      database.driver: postgres
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'pg.mycompany.com'
---
suite: infrastructure disabled
templates:
  - redis-deployment.yaml
tests:
  - it: should not deploy redis when disabled
    set:
      redis.enabled: false
    asserts:
      - hasDocuments:
          count: 0
---
suite: postgresql disabled
templates:
  - postgresql-statefulset.yaml
tests:
  - it: should not deploy postgresql when disabled
    set:
      postgresql.enabled: false
    asserts:
      - hasDocuments:
          count: 0
---
suite: minio disabled
templates:
  - minio-deployment.yaml
tests:
  - it: should not deploy minio when disabled
    set:
      minio.enabled: false
    asserts:
      - hasDocuments:
          count: 0
