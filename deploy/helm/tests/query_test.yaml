---
suite: query
templates:
  - query-deployment.yaml
tests:
  - it: should create Deployment
    asserts:
      - isKind:
          of: Deployment
      - hasDocuments:
          count: 1
      - matchRegex:
          path: metadata.name
          pattern: 'RELEASE-NAME-query'
      - equal:
          path: spec.replicas
          value: 2
  - it: should have liveness and readiness probes
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers.livenessProbe
      - isNotEmpty:
          path: spec.template.spec.containers.readinessProbe
  - it: should give liveness a lenient failureThreshold (catalog check is critical now)
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 18
  - it: should have resource limits
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers.resources
  - it: should set checksum/config annotation to trigger restarts on config changes
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: '^[a-f0-9]{64}$'
  - it: should create HPA when autoscaling is enabled
    set:
      query.autoscaling.enabled: true
    asserts:
      - hasDocuments:
          count: 2
  - it: should read the quack client token from the shared secret by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_QUACK_CLIENT_TOKEN
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-secret
                key: quack-token

  - it: should read the quack client token from existingSecret when set
    set:
      quack.server.existingSecret: "my-quack-token-secret"
      quack.server.existingSecretKey: "quack-token-value"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_QUACK_CLIENT_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-quack-token-secret
                key: quack-token-value
