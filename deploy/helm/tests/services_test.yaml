---
suite: ingest service
templates:
  - ingest-service.yaml
tests:
  - it: should create Ingest service
    asserts:
      - isKind:
          of: Service
      - matchRegex:
          path: metadata.name
          pattern: 'RELEASE-NAME-ingest'
      - equal:
          path: spec.type
          value: ClusterIP
