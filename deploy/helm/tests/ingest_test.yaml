---
suite: ingest
templates:
  - ingest-deployment.yaml
tests:
  - it: should create Deployment
    asserts:
      - isKind:
          of: Deployment
      - hasDocuments:
          count: 1
      - matchRegex:
          path: metadata.name
          pattern: 'RELEASE-NAME-ingest'
      - equal:
          path: spec.replicas
          value: 2
  - it: should have liveness and readiness probes
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers.livenessProbe
      - isNotEmpty:
          path: spec.template.spec.containers.readinessProbe
  - it: should have resource limits
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers.resources
  - it: should set checksum/config annotation to trigger restarts on config changes
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: '^[a-f0-9]{64}$'
  - it: should not create HPA when autoscaling is disabled
    asserts:
      - hasDocuments:
          count: 1
  - it: should create HPA when autoscaling is enabled
    set:
      ingest.autoscaling.enabled: true
    asserts:
      - hasDocuments:
          count: 2
