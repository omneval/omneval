---
suite: configmap
templates:
  - configmap.yaml
tests:
  - it: should create ConfigMap
    asserts:
      - isKind:
          of: ConfigMap
      - hasDocuments:
          count: 1
      - matchRegex:
          path: metadata.name
          pattern: 'RELEASE-NAME-config'
      - isNotEmpty:
          path: data

  - it: should include redis config when redis is enabled
    set:
      redis.enabled: true
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'redis:'

  - it: should include database config when postgresql is enabled
    set:
      postgresql.enabled: true
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'driver: postgres'

  - it: should include storage config when minio is enabled
    set:
      minio.enabled: true
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'endpoint:'

  - it: should include auth config
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'session_ttl:'

  - it: should include quack server and client config
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'quack:'
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'listen_addr:'
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'RELEASE-NAME-quack-server:9494'

  - it: should derive an s3 quack data path when storage is configured
    set:
      storage.bucket: omneval
      storage.endpoint: "http://minio:9000"
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 's3://omneval/lake'
