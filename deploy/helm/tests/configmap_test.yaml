---
suite: configmap
templates:
  - configmap.yaml
tests:
  - it: should create ConfigMap
    asserts:
      - isKind:
          of: ConfigMap
      - hasDocuments:
          count: 1
      - matchRegex:
          path: metadata.name
          pattern: 'RELEASE-NAME-config'
      - isNotEmpty:
          path: data

  - it: should include redis config when redis is enabled
    set:
      redis.enabled: true
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'redis:'

  - it: should include database config when postgresql is enabled
    set:
      postgresql.enabled: true
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'driver: postgres'

  - it: should include storage config when minio is enabled
    set:
      minio.enabled: true
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'endpoint:'

  - it: should include auth config
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'session_ttl:'

  - it: should include quack server and client config
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'quack:'
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'listen_addr:'
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'RELEASE-NAME-quack-server:9494'

  - it: should derive an s3 quack data path when storage is configured
    set:
      storage.bucket: omneval
      storage.endpoint: "http://minio:9000"
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 's3://omneval/lake'

  - it: should default catalog_driver to duckdb when not explicitly set
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'catalog_driver: "duckdb"'

  - it: should respect explicit catalog_driver postgres
    set:
      quack.server.catalogDriver: postgres
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'catalog_driver: "postgres"'

  - it: should default memory_limit to 1536MiB (75% of the default 2Gi limit)
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'memory_limit: "1536MiB"'

  - it: should respect an explicit memoryLimit override
    set:
      quack.server.memoryLimit: "3GB"
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'memory_limit: "3GB"'

  - it: should default client max_open_conns to 0 (falls back to the client's built-in default)
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'max_open_conns: 0'

  - it: should respect an explicit client maxOpenConns override
    set:
      quack.client.maxOpenConns: 4
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'max_open_conns: 4'

  - it: should default client memory_limit to empty (no pragma)
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'client:[\s\S]*?memory_limit: ""'

  - it: should respect an explicit client memoryLimit override
    set:
      quack.client.memoryLimit: "768MiB"
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'memory_limit: "768MiB"'

  - it: should default server threads to 0 (no pragma)
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'server:[\s\S]*?threads: 0'

  - it: should respect an explicit server threads override
    set:
      quack.server.threads: 2
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'threads: 2'

  - it: should default client threads to 0 (no pragma)
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'client:[\s\S]*?threads: 0'

  - it: should respect an explicit client threads override
    set:
      quack.client.threads: 2
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'threads: 2'
