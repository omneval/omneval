---
suite: servicemonitor
templates:
  - servicemonitor.yaml
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when metrics.serviceMonitor.enabled is true
    set:
      metrics.serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: monitoring.coreos.com/v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-omneval
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: omneval
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: spec.namespaceSelector.matchNames[0]
          value: NAMESPACE
      - equal:
          path: spec.endpoints[0].port
          value: metrics
      - equal:
          path: spec.endpoints[0].path
          value: /metrics

  - it: should default the scrape interval to 30s
    set:
      metrics.serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: "30s"

  - it: should respect an explicit interval override
    set:
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.interval: "15s"
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: "15s"

  - it: should merge additionalLabels onto the ServiceMonitor metadata
    set:
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.additionalLabels:
        release: kube-prometheus-stack
    asserts:
      - equal:
          path: metadata.labels.release
          value: kube-prometheus-stack

  - it: should include commonLabels on the ServiceMonitor metadata
    set:
      metrics.serviceMonitor.enabled: true
      commonLabels:
        team: platform
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
