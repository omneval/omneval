---
suite: secret
templates:
  - secret.yaml
tests:
  - it: should create Secret
    asserts:
      - isKind:
          of: Secret
      - hasDocuments:
          count: 1
      - equal:
          path: type
          value: Opaque
      - matchRegex:
          path: metadata.name
          pattern: 'RELEASE-NAME-secret'

  - it: should include postgres-dsn when postgresql is enabled
    set:
      postgresql.enabled: true
    asserts:
      - isNotEmpty:
          path: stringData.postgres-dsn

  - it: should include storage credentials when storage.endpoint is set
    set:
      storage.endpoint: "http://s3.example.com"
      storage.accessKey: "AKIAIOSFODNN7EXAMPLE"
      storage.secretKey: "secret"
    asserts:
      - isNotEmpty:
          path: stringData.storage-access-key
      - isNotEmpty:
          path: stringData.storage-secret-key

  - it: should include storage credentials when minio is enabled
    set:
      minio.enabled: true
    asserts:
      - isNotEmpty:
          path: stringData.storage-access-key
      - isNotEmpty:
          path: stringData.storage-secret-key

  - it: should include eval-llm-api-key when set
    set:
      eval.llmAPIKey: "sk-test-key"
    asserts:
      - isNotEmpty:
          path: stringData.eval-llm-api-key

  - it: should include redis-password when redis auth is enabled
    set:
      redis.enabled: true
      redis.auth.enabled: true
      redis.auth.password: "redissecret"
    asserts:
      - isNotEmpty:
          path: stringData.redis-password

  - it: should include admin credentials when set
    set:
      query.adminEmail: "admin@example.com"
      query.adminPassword: "adminpass"
    asserts:
      - equal:
          path: stringData.admin-email
          value: admin@example.com
      - equal:
          path: stringData.admin-password
          value: adminpass
