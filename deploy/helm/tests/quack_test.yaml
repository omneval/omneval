---
suite: quack-server
templates:
  - quack-server-statefulset.yaml
tests:
  - it: should create StatefulSet and Service
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        isKind:
          of: StatefulSet
      - documentIndex: 1
        isKind:
          of: Service
      - documentIndex: 0
        matchRegex:
            path: metadata.name
            pattern: 'RELEASE-NAME-quack-server'
      - documentIndex: 0
        equal:
          path: spec.replicas
          value: 1

  - it: should have a single replica (sole Catalog connection, ADR-0005)
    asserts:
      - documentIndex: 0
        equal:
          path: spec.replicas
          value: 1

  - it: should expose the quack and metrics ports
    asserts:
      - documentIndex: 1
        contains:
          path: spec.ports
          content:
            name: quack
            port: 9494
            targetPort: 9494
            protocol: TCP
      - documentIndex: 0
        contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: quack
            containerPort: 9494
            protocol: TCP

  - it: should have liveness and readiness probes
    asserts:
      - documentIndex: 0
        isNotEmpty:
          path: spec.template.spec.containers[0].livenessProbe
      - documentIndex: 0
        isNotEmpty:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should have resource limits
    asserts:
      - documentIndex: 0
        isNotEmpty:
          path: spec.template.spec.containers[0].resources

  - it: should read the quack token from the shared secret by default
    asserts:
      - documentIndex: 0
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_QUACK_SERVER_TOKEN
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-secret
                key: quack-token

  - it: should read the quack token from existingSecret when set
    set:
      quack.server.existingSecret: "my-quack-token-secret"
      quack.server.existingSecretKey: "quack-token-value"
    asserts:
      - documentIndex: 0
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_QUACK_SERVER_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-quack-token-secret
                key: quack-token-value

  - it: should use default existingSecretKey when only existingSecret is set
    set:
      quack.server.existingSecret: "my-quack-token-secret"
    asserts:
      - documentIndex: 0
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_QUACK_SERVER_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-quack-token-secret
                key: token

  - it: should have a serviceName for the StatefulSet
    asserts:
      - documentIndex: 0
        matchRegex:
          path: spec.serviceName
          pattern: 'RELEASE-NAME-quack-server'

  - it: should provision PVC for default duckdb catalogDriver
    asserts:
      - isNotEmpty:
          path: spec.volumeClaimTemplates

  - it: should provision a PVC for the local catalog driver
    set:
      quack.server.catalogDriver: duckdb
    asserts:
      - documentIndex: 0
        isNotEmpty:
          path: spec.volumeClaimTemplates

  - it: should not provision a PVC when the data path is s3 and catalog is postgres
    set:
      storage.bucket: omneval
      storage.endpoint: "http://minio:9000"
      quack.server.catalogDriver: postgres
    asserts:
      - documentIndex: 0
        notExists:
          path: spec.volumeClaimTemplates

  - it: should create a ServiceAccount when serviceAccount.create is true
    set:
      quack.server.serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 2
        isKind:
          of: ServiceAccount

  - it: should render backup env vars when backup.enabled is true
    set:
      quack.server.backup:
        enabled: true
        interval: "2h"
        keepCount: 12
    asserts:
      - documentIndex: 0
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_QUACK_SERVER_BACKUP_ENABLED
            value: "true"
      - documentIndex: 0
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_QUACK_SERVER_BACKUP_INTERVAL
            value: "2h"
      - documentIndex: 0
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_QUACK_SERVER_BACKUP_KEEP_COUNT
            value: "12"

  - it: should render OMNEVAL_QUACK_SERVER_BACKUP_ENABLED as explicit "false" when backup.enabled is false
    set:
      quack.server.backup:
        enabled: false
    asserts:
      - documentIndex: 0
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNEVAL_QUACK_SERVER_BACKUP_ENABLED
            value: "false"

---
suite: quack server catalog and PVC
templates:
  - configmap.yaml
tests:
  - it: should render catalog_driver duckdb in the configmap by default
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'catalog_driver: "duckdb"'

  - it: should render the backup section in the configmap by default
    asserts:
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'backup:'
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'enabled: true'
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'interval: "1h"'
      - matchRegex:
          path: data["omneval.yaml"]
          pattern: 'keep_count: 24'

---
suite: quack server PVC
templates:
  - quack-server-statefulset.yaml
tests:
  - it: should provision PVC by default when catalog_driver is duckdb
    asserts:
      - isNotEmpty:
          path: spec.volumeClaimTemplates
