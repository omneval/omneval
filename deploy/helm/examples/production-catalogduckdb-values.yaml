# Production values override for CatalogDriverLocal (DuckDB file catalog)
#
# Usage:
#   helm upgrade omneval ./deploy/helm --values production-catalogduckdb-values.yaml
#
# Prerequisites:
#   1. Ensure S3 storage is configured (storage.endpoint + storage.bucket + credentials)
#   2. Ensure Quack Server existingSecret is set for the auth token (GitOps-safe)
#   3. If the Catalog file is lost and no PVC backup exists, see:
#      docs/runbooks/catalog-rebuild-from-parquet.md (last-resort rebuild from Parquet)
#
# WARNING: If the Catalog is lost and must be rebuilt, this is a human-in-the-loop
# (HITL) operation requiring a maintenance window.

# ============================================================================
# Quack Server — DuckDB file Catalog (CatalogDriverLocal)
# ============================================================================
quack:
  server:
    # Catalog driver: duckdb (local DuckDB file on PVC, single-writer)
    catalogDriver: "duckdb"

    # Catalog DSN: empty — defaults to lake/catalog.duckdb on the PVC
    # Only set this if you need a custom path (not recommended for production)
    catalogDSN: ""

    # Lake data path: empty — derived from storage.bucket → s3://<bucket>/lake
    # Only set this if the Lake Parquet files are at a non-standard S3 prefix
    dataPath: ""

    # Bounds DuckDB's buffer manager (`SET memory_limit`) so it backs off
    # under memory pressure instead of being OOM-killed by the kernel. Set
    # to ~75% of whatever memory limit you configure below (or the chart
    # default of 2Gi if you don't override resources here) — adjust if you
    # raise resources.limits.memory.
    memoryLimit: "1536MiB"

    # Lake-native retention (optional — disabled by default)
    retention:
      enabled: false
      maxAgeDays: 0

  # PVC for the Catalog file and Lake data path
  pvc:
    size: 10Gi
    storageClass: ""  # set to your cluster's default storage class (e.g. "gp3")
    accessMode: ReadWriteOnce

  # Client configuration (shared by Writer, Query API, and Eval)
  client:
    # Quack Server URL: empty — derives from release name
    # Only set this if using an external Quack Server (not the typical case)
    url: ""
    # Lake data path for clients: empty — derives from quack.server.dataPath
    dataPath: ""
    # Connection pool size per Lake client (query/writer/eval pods). A pool
    # of 1 means every call on a pod's Lake instance — including the
    # readiness/liveness Ping — serializes behind whatever query is
    # currently running, so one slow UI query can freeze health checks for
    # the entire pod even while the Quack Server itself is healthy. Keep
    # this modest against CatalogDriverLocal (single-writer file Catalog):
    # each connection is a full embedded DuckDB session, and many
    # concurrent connections across pods can contend more heavily than a
    # Postgres-backed Catalog would.
    maxOpenConns: 2
    # Bounds this client's own embedded DuckDB buffer manager. Set to ~75%
    # of query.resources.limits.memory / writer.resources.limits.memory
    # (whatever you configure those to), same reasoning as
    # quack.server.memoryLimit above.
    memoryLimit: ""

# ============================================================================
# Storage — S3-compatible object store (required for Lake Parquet files)
# ============================================================================
storage:
  endpoint: ""       # e.g. "https://s3.amazonaws.com" or "https://s3.us-west-2.amazonaws.com"
  bucket: ""         # e.g. "omneval-lake"
  region: "us-east-1"
  accessKey: ""      # set via omneval-secret (or use IAM roles)
  secretKey: ""      # set via omneval-secret (or use IAM roles)

# ============================================================================
# MinIO — disabled in production (use external S3)
# ============================================================================
minio:
  enabled: false

# ============================================================================
# Metadata database — PostgreSQL (retained for metadata store)
# ============================================================================
database:
  driver: "postgres"
  dsn: ""  # empty — derived from postgresql section below

postgresql:
  enabled: true  # internal Postgres for metadata, or set enabled: false + external.* for external Postgres
  auth:
    username: omneval
    # NOTE: set password explicitly or prefer existingSecret for GitOps safety
    database: omneval

# ============================================================================
# Quack Server — existingSecret for auth token (GitOps-safe)
# ============================================================================
# Uncomment and set when using a pre-existing Secret for the Quack token:
#
# quack:
#   server:
#     existingSecret: "my-quack-token-secret"
#     existingSecretKey: "token"
