# Example Helm values for deploying Omneval onto the load-test EKS cluster.
#
# Fill in the placeholders from `terraform output` (s3_bucket, s3_endpoint,
# omneval_s3_access_key_id, omneval_s3_secret_access_key, rds_*, redis_addr),
# then:
#
#   helm install omneval ../../helm -f values-loadtest.yaml -n omneval --create-namespace
#
# This mirrors deploy/docker-compose/docker-compose.yml's service config but
# points storage at the real S3 bucket, Postgres at RDS, and Redis at
# ElastiCache, all created by this Terraform, instead of in-cluster
# MinIO/Postgres/Redis — so in-cluster storage/queue I/O isn't a confound
# when publishing throughput numbers.

database:
  driver: postgres

storage:
  endpoint: "<S3_ENDPOINT>"        # terraform output s3_endpoint
  bucket: "<S3_BUCKET>"            # terraform output s3_bucket
  region: "<AWS_REGION>"
  accessKey: "<ACCESS_KEY_ID>"     # terraform output omneval_s3_access_key_id
  secretKey: "<SECRET_ACCESS_KEY>" # terraform output -raw omneval_s3_secret_access_key

minio:
  enabled: false

# Shared Postgres (Omneval metadata store + DuckLake Catalog) — RDS instead
# of in-cluster.
postgresql:
  enabled: false
  external:
    host: "<RDS_HOST>"            # terraform output rds_host
    port: 5432                    # terraform output rds_port
    database: "<RDS_DATABASE>"    # terraform output rds_database
    user: "<RDS_USERNAME>"        # terraform output rds_username
    password: "<RDS_PASSWORD>"    # terraform output -raw rds_password
    sslmode: "require"

# Ingest -> Writer queue — ElastiCache instead of in-cluster.
redis:
  enabled: false
  external:
    addr: "<REDIS_ADDR>"          # terraform output redis_addr
    password: ""

quack:
  server:
    catalogDriver: postgres

# Bump replicas/resources to match the EKS node group sized by variables.tf
# (default: 3x m5.xlarge). Tune these between runs as part of the benchmark.
ingest:
  replicas: 3
  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

writer:
  replicas: 3
  resources:
    limits:
      cpu: "2"
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

query:
  replicas: 2
  adminEmail: "admin@omneval.com"
  adminPassword: "admin"
